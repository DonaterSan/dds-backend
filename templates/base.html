<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ДДС{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        :root {
            --accent: #2e7d5f;
            --accent-hover: #245f49;
            --nav-bg: #3b3f4a;
            --nav-bg-hover: #4e5360;
        }
        body { background: #fff; font-family: 'Segoe UI', system-ui, sans-serif; }
        .navbar { background: var(--nav-bg) !important; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
        .navbar .nav-link.active { color: #d4e8dc !important; border-bottom: 2px solid #8cc5a5; }
        .navbar .nav-link:hover { color: #ccc !important; }
        .navbar-brand { font-weight: 600; letter-spacing: .5px; }

        .btn-primary, .btn-primary:focus { background: var(--accent); border-color: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
        .btn-success { background: #3a8f6a; border-color: #3a8f6a; }
        .btn-success:hover { background: #2e7d5f; border-color: #2e7d5f; }
        .btn-outline-primary { color: var(--accent); border-color: var(--accent); }
        .btn-outline-primary:hover { background: var(--accent); border-color: var(--accent); }

        .table th { white-space: nowrap; }
        .table-dark, .table-dark th { background: var(--nav-bg) !important; }
        .btn-action { padding: 2px 8px; font-size: 0.85rem; }
        .filter-row .form-control, .filter-row .form-select { font-size: 0.9rem; }

        .card { border: none; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
        .card-header { background: #f0f1f3; font-size: .95rem; }

        h4 { color: #2c3038; font-weight: 600; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-wallet2"></i> Учёт ДДС
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link {% block nav_records %}{% endblock %}" href="/">Записи</a>
                <a class="nav-link {% block nav_refs %}{% endblock %}" href="/references/">Справочники</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
